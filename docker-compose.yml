services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webinaire-app
    restart: unless-stopped
    volumes:
      - storage:/app/storage
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webinaire-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage:/app/storage
    networks:
      - dokploy-network
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  storage:
    driver: local

networks:
  dokploy-network:
    external: true
